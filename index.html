<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Messages</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
    }

    .bg {
      background: url('YOUR-IMAGE-HERE.jpg') no-repeat center center/cover;
      height: 100%;
      position: relative;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      flex-direction: column;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #00c853;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      background: #00a844;
    }

    .small {
      font-size: 14px;
      opacity: 0.8;
    }

    .age-box {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
    }

    .age-box button {
      margin: 10px;
      background: red;
    }
  </style>
</head>

<body>

<!-- Age Gate -->
<div class="age-box" id="ageGate">
  <h2>Are you over 18?</h2>
  <button onclick="enterSite()">YES</button>
  <button onclick="leaveSite()">NO</button>
</div>

<!-- Main Page -->
<div class="bg">
  <div class="overlay">
    <h1>You have 3 new messages 😳</h1>
    <button onclick="goOffer()">Read Messages</button>
    <div class="small">100% Free - No Credit Card</div>
  </div>
</div>

<script>
  function enterSite() {
    document.getElementById('ageGate').style.display = 'none';
  }

  function leaveSite() {
    window.location.href = "https://google.com";
  }

  function goOffer() {
    window.location.href = "YOUR-AFFILIATE-LINK-HERE";
  }
</script>

</body>
</html>
