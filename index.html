<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Privé</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0a0a0a, #121212);
    color: white;
    text-align: center;
}

/* Title */
h1 {
    margin-top: 40px;
    font-size: 26px;
    font-weight: bold;
}

/* Main Box */
.box {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 25px;
    margin: 40px auto;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 25px rgba(255, 0, 128, 0.2);
}

/* Text inside */
.box p {
    font-size: 16px;
    line-height: 1.6;
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    background: linear-gradient(45deg, #ff0080, #8000ff);
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,0,128,0.5);
}

/* Warning */
.warning {
    margin-top: 30px;
    font-size: 13px;
    color: #aaa;
}
</style>

</head>

<body>

<h1>🔥 Des personnes près de vous sont en ligne maintenant</h1>

<div class="box">
    <p>
        💬 Rejoignez une plateforme privée de discussion<br><br>
        🌍 Utilisateurs actifs dans plusieurs pays<br>
        💬 Connexion instantanée 24/7<br>
        🔒 Expérience privée et sécurisée
    </p>

    <a class="btn" href="PUT_YOUR_LINK_HERE">
        👉 Entrer dans le chat
    </a>
</div>

<div class="warning">
    ⚠️ Réservé aux adultes (18+) uniquement
</div>

</body>
</html>
