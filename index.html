<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Experience</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1a0033);
    color: white;
    text-align: center;
}

/* Title */
h1 {
    margin-top: 60px;
    font-size: 32px;
    font-weight: bold;
}

.subtitle {
    margin-top: 10px;
    color: #ccc;
    font-size: 16px;
}

/* Card */
.card {
    background: linear-gradient(135deg, #4b00ff, #8a2be2);
    border-radius: 20px;
    padding: 30px;
    margin: 50px auto;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* Text */
.card p {
    font-size: 16px;
    line-height: 1.6;
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 14px 25px;
    font-size: 16px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0,198,255,0.7);
}

/* Warning */
.warning {
    margin-top: 30px;
    font-size: 13px;
    color: #aaa;
}
</style>

</head>

<body>

<h1>Discover Private Live Experience</h1>
<div class="subtitle">Join now and explore premium live chat platforms</div>

<div class="card">
    <p>
        ✔ High-quality live experience<br>
        ✔ Thousands of active users<br>
        ✔ Instant connection anytime<br>
        ✔ Private & secure platform
    </p>

    <a class="btn" href="PUT_YOUR_LINK_HERE">
        👉 Enter Now
    </a>
</div>

<div class="warning">
    ⚠️ Adults only (18+)
</div>

</body>
</html>
